<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <title>SignBridge — Sign ↔ Speak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #060810;
            --surface: #0d1117;
            --surface2: #141a24;
            --surface3: #1c2433;
            --border: #242d3d;
            --border2: #2e3a4e;
            --accent: #00e5c8;
            --accent-dim: #007a6e;
            --accent2: #ff4d6d;
            --accent3: #7c6cff;
            --text: #dde5f0;
            --dim: #5a6880;
            --dim2: #8a96a8;
            --mono: 'Space Mono', monospace;
            --sans: 'DM Sans', sans-serif;
            --rad: 6px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            overflow: hidden;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .06) 2px, rgba(0, 0, 0, .06) 4px);
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .logo {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: .04em;
            white-space: nowrap;
        }

        .logo em {
            color: var(--accent);
            font-style: normal;
        }

        .hdr-center {
            display: flex;
            gap: 6px;
            flex: 1;
            justify-content: center;
        }

        .hdr-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .tabs {
            flex-shrink: 0;
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 11px 6px;
            font-family: var(--mono);
            font-size: .65rem;
            letter-spacing: .07em;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--dim);
            border-bottom: 2px solid transparent;
            transition: all .2s;
            outline: none;
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: var(--surface2);
        }

        .tab:hover:not(.active) {
            color: var(--text);
            background: var(--surface2);
        }

        .panels {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .panel {
            display: none;
            height: 100%;
            flex-direction: column;
        }

        .panel.active {
            display: flex;
        }

        #mode1 {
            flex-direction: row;
            gap: 0;
        }

        .cam-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .feed-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feed-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity .3s;
        }

        .feed-img.hidden {
            opacity: 0;
            position: absolute;
            pointer-events: none;
        }

        .hud {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .hud-topleft {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, .75);
            border: 1px solid var(--accent);
            border-radius: 3px;
            padding: 3px 9px;
            font-family: var(--mono);
            font-size: .78rem;
            color: var(--accent);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .25
            }
        }

        .mode-badge {
            background: rgba(0, 0, 0, .75);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 2px 8px;
            font-family: var(--mono);
            font-size: .62rem;
            color: var(--dim);
        }

        .sentence-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(2, 4, 8, .9));
            padding: 32px 12px 10px;
            min-height: 64px;
            display: flex;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 5px;
        }

        .chip {
            font-family: var(--mono);
            font-size: .82rem;
            background: rgba(0, 229, 200, .12);
            border: 1px solid rgba(0, 229, 200, .35);
            color: var(--accent);
            padding: 3px 9px;
            border-radius: 3px;
            animation: chipIn .15s ease-out;
        }

        .chip.spell {
            background: rgba(255, 77, 109, .12);
            border-color: rgba(255, 77, 109, .35);
            color: var(--accent2);
        }

        @keyframes chipIn {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .stats-col {
            width: 220px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-left: 1px solid var(--border);
            overflow: hidden;
        }

        .stats-section {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .stats-lbl {
            font-family: var(--mono);
            font-size: .58rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 8px;
        }

        #conf-wave {
            display: block;
            width: 100%;
            height: 44px;
        }

        .top3-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .top3-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .top3-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .top3-label {
            font-family: var(--mono);
            font-size: .72rem;
            color: var(--text);
        }

        .top3-pct {
            font-family: var(--mono);
            font-size: .6rem;
            color: var(--dim);
        }

        .top3-track {
            height: 4px;
            background: var(--surface3);
            border-radius: 2px;
            overflow: hidden;
        }

        .top3-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .12s ease-out;
        }

        .top3-fill.rank0 {
            background: var(--accent);
        }

        .top3-fill.rank1 {
            background: var(--accent3);
        }

        .top3-fill.rank2 {
            background: var(--dim);
        }

        .corrected-box {
            font-family: var(--sans);
            font-size: .82rem;
            line-height: 1.45;
            color: var(--text);
            min-height: 40px;
            padding: 4px 2px;
        }

        .corrected-box .raw {
            font-size: .7rem;
            color: var(--dim);
            margin-top: 4px;
            font-family: var(--mono);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .h-entry {
            padding: 7px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .h-word {
            font-family: var(--mono);
            font-size: .75rem;
            color: var(--accent);
        }

        .h-sentence {
            font-size: .72rem;
            color: var(--dim2);
            line-height: 1.3;
        }

        .h-time {
            font-family: var(--mono);
            font-size: .56rem;
            color: var(--dim);
        }

        .history-list::-webkit-scrollbar {
            width: 3px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        .ctrl-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 12px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .btn {
            font-family: var(--mono);
            font-size: .62rem;
            letter-spacing: .06em;
            text-transform: uppercase;
            padding: 8px 12px;
            border-radius: var(--rad);
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            transition: all .15s;
            outline: none;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn.danger {
            border-color: rgba(255, 77, 109, .5);
            color: var(--accent2);
        }

        .btn.danger:hover {
            background: rgba(255, 77, 109, .1);
            border-color: var(--accent2);
        }

        .btn.active-toggle {
            background: rgba(0, 229, 200, .1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .spell-display {
            font-family: var(--mono);
            font-size: .68rem;
            color: var(--dim);
            margin-left: auto;
            white-space: nowrap;
        }

        .spell-display span {
            color: var(--accent2);
            font-weight: 700;
            letter-spacing: .12em;
        }

        .conn-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--surface2);
            border: 1px solid var(--border);
            font-family: var(--mono);
            font-size: .6rem;
            color: var(--dim);
        }

        .conn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--dim);
            transition: all .3s;
        }

        .conn-dot.live {
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            animation: pulse 2s infinite;
        }

        .conn-dot.err {
            background: var(--accent2);
        }

        #mode2 {
            padding: 16px 14px;
            gap: 14px;
            overflow-y: auto;
        }

        #mode2::-webkit-scrollbar {
            width: 4px;
        }

        #mode2::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .lbl {
            font-family: var(--mono);
            font-size: .62rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 7px;
        }

        .inp-row {
            display: flex;
            gap: 8px;
        }

        #txt-inp {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--rad);
            padding: 10px 13px;
            font-family: var(--mono);
            font-size: .85rem;
            color: var(--text);
            outline: none;
            transition: border-color .2s;
        }

        #txt-inp:focus {
            border-color: var(--accent);
        }

        #txt-inp::placeholder {
            color: var(--dim);
        }

        .btn.primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 700;
        }

        .btn.primary:hover {
            background: #00c4ae;
        }

        .queue-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            min-height: 24px;
        }

        .qchip {
            font-family: var(--mono);
            font-size: .68rem;
            padding: 3px 8px;
            border-radius: 3px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--dim);
            transition: all .2s;
        }

        .qchip.playing {
            background: rgba(0, 229, 200, .14);
            border-color: var(--accent);
            color: var(--accent);
        }

        .qchip.done {
            opacity: .28;
        }

        .vid-box {
            flex: 1;
            background: #000;
            border-radius: var(--rad);
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 180px;
        }

        #asl-vid {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .vid-ph {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--dim);
            font-family: var(--mono);
            font-size: .7rem;
        }

        .vid-ph svg {
            opacity: .2;
        }

        .now-lbl {
            position: absolute;
            bottom: 9px;
            left: 9px;
            font-family: var(--mono);
            font-size: .78rem;
            color: var(--accent);
            background: rgba(0, 0, 0, .75);
            padding: 2px 8px;
            border-radius: 3px;
            display: none;
        }

        .pdots {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-top: 2px;
            flex-wrap: wrap;
        }

        .pdot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--border);
            transition: all .2s;
            flex-shrink: 0;
        }

        .pdot.cur {
            background: var(--accent);
            box-shadow: 0 0 5px var(--accent);
        }

        .pdot.done {
            background: var(--dim);
        }

        .nlp-status {
            font-family: var(--mono);
            font-size: .58rem;
            color: var(--dim);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 4px;
        }

        .nlp-spinner {
            width: 8px;
            height: 8px;
            border: 1.5px solid var(--accent-dim);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .6s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .nlp-done {
            color: var(--accent);
        }

        #toast {
            position: fixed;
            bottom: 16px;
            right: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            padding: 8px 13px;
            font-family: var(--mono);
            font-size: .7rem;
            border-radius: var(--rad);
            transform: translateY(14px);
            opacity: 0;
            transition: all .25s;
            z-index: 10000;
            max-width: 240px;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        #toast.err {
            border-left-color: var(--accent2);
        }

        @media (max-width: 560px) {
            .stats-col {
                display: none;
            }

            .logo {
                font-size: .85rem;
            }
        }
    </style>
</head>

<body>
    <div class="app">

        <header>
            <div class="logo">Sign<em>Bridge</em></div>
            <div class="hdr-center"></div>
            <div class="hdr-right">
                <div class="conn-pill">
                    <div class="conn-dot" id="cdot"></div>
                    <span id="conn-txt">—</span>
                </div>
            </div>
        </header>

        <div class="tabs">
            <button class="tab active" id="tab1" onclick="switchMode(1)">✋ Sign → Text</button>
            <button class="tab" id="tab2" onclick="switchMode(2)">⌨️ Text → Sign</button>
        </div>

        <div class="panels">

            <div class="panel active" id="mode1">

                <div class="cam-col">
                    <div class="feed-wrap">
                        <img id="video-feed" class="feed-img" src="/video_feed" alt="Video" />
                        <img id="skeleton-feed" class="feed-img hidden" src="/skeleton_feed" alt="Skeleton" />

                        <div class="hud">
                            <div class="hud-topleft">
                                <div class="live-badge">
                                    <span class="live-dot"></span>
                                    <span id="live-label">— —</span>
                                </div>
                                <div class="mode-badge" id="view-badge">VIDEO</div>
                            </div>
                        </div>

                        <div class="sentence-overlay" id="sent-overlay"></div>
                    </div>

                    <div class="ctrl-bar">
                        <button class="btn danger" onclick="doReset()">Reset</button>
                        <button class="btn" onclick="doFlush()">End Word</button>
                        <button class="btn" id="btn-skeleton" onclick="toggleSkeleton()">☠ Skeleton</button>
                        <button class="btn" onclick="speakSentence()">🔊 Speak</button>
                        <div class="spell-display">Spelling: <span id="spell-disp">—</span></div>
                    </div>
                </div>

                <div class="stats-col">

                    <div class="stats-section">
                        <div class="stats-lbl">Confidence Wave</div>
                        <canvas id="conf-wave"></canvas>
                    </div>

                    <div class="stats-section">
                        <div class="stats-lbl">Top Predictions</div>
                        <div class="top3-row" id="top3-row">
                            <div class="top3-item">
                                <div class="top3-header"><span class="top3-label">—</span><span
                                        class="top3-pct">0%</span></div>
                                <div class="top3-track">
                                    <div class="top3-fill rank0" style="width:0%"></div>
                                </div>
                            </div>
                            <div class="top3-item">
                                <div class="top3-header"><span class="top3-label">—</span><span
                                        class="top3-pct">0%</span></div>
                                <div class="top3-track">
                                    <div class="top3-fill rank1" style="width:0%"></div>
                                </div>
                            </div>
                            <div class="top3-item">
                                <div class="top3-header"><span class="top3-label">—</span><span
                                        class="top3-pct">0%</span></div>
                                <div class="top3-track">
                                    <div class="top3-fill rank2" style="width:0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="stats-section">
                        <div class="stats-lbl">Smart Sentence</div>
                        <div class="corrected-box" id="corrected-box">
                            <span style="color:var(--dim)">Detecting…</span>
                        </div>
                        <div class="nlp-status" id="nlp-status" style="display:none">
                            <div class="nlp-spinner"></div>
                            <span>Processing…</span>
                        </div>
                    </div>

                    <div class="stats-section" style="padding-bottom:4px; border-bottom:none;">
                        <div class="stats-lbl">History</div>
                    </div>
                    <div class="history-list" id="history-list"></div>

                </div>
            </div>

            <div class="panel" id="mode2">
                <div>
                    <div class="lbl">Type a sentence to translate to Sign Language</div>
                    <div class="inp-row">
                        <input id="txt-inp" type="text" placeholder="e.g.  hello my name" autocomplete="off"
                            autocorrect="off" spellcheck="false" />
                        <button class="btn primary" onclick="startPlayback()">Play</button>
                    </div>
                </div>

                <div>
                    <div class="lbl">Playback queue</div>
                    <div class="queue-row" id="queue-row"></div>
                </div>

                <div class="vid-box">
                    <div class="vid-ph" id="vid-ph">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.2">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                        <span>Awaiting playback</span>
                    </div>
                    <video id="asl-vid" playsinline></video>
                    <div class="now-lbl" id="now-lbl"></div>
                </div>

                <div class="pdots" id="pdots"></div>
            </div>

        </div>
    </div>

    <div id="toast"></div>

    <script>
        let evtSource = null;
        let skeletonMode = false;
        let availVids = {};
        let vidQueue = [];
        let vidIdx = 0;
        let lastSentence = [];

        const WAVE_LEN = 60;
        const waveData = new Array(WAVE_LEN).fill(0);

        function switchMode(m) {
            document.getElementById("tab1").classList.toggle("active", m === 1);
            document.getElementById("tab2").classList.toggle("active", m === 2);
            document.getElementById("mode1").classList.toggle("active", m === 1);
            document.getElementById("mode2").classList.toggle("active", m === 2);
            if (m === 2) fetchVids();
        }

        function toggleSkeleton() {
            skeletonMode = !skeletonMode;
            document.getElementById("video-feed").classList.toggle("hidden", skeletonMode);
            document.getElementById("skeleton-feed").classList.toggle("hidden", !skeletonMode);
            document.getElementById("btn-skeleton").classList.toggle("active-toggle", skeletonMode);
            document.getElementById("view-badge").textContent = skeletonMode ? "SKELETON" : "VIDEO";
        }

        function connectSSE() {
            if (evtSource) evtSource.close();
            evtSource = new EventSource("/prediction_stream");
            evtSource.onopen = () => setConn("live", "LIVE");
            evtSource.onmessage = e => { try { handlePred(JSON.parse(e.data)); } catch (_) { } };
            evtSource.onerror = () => setConn("err", "RECONNECTING");
        }

        function showNlpProcessing() {
            const ns = document.getElementById("nlp-status");
            ns.style.display = "flex";
            ns.innerHTML = '<div class="nlp-spinner"></div><span>Processing NLP…</span>';
        }
        function showNlpDone(corrected) {
            const ns = document.getElementById("nlp-status");
            ns.innerHTML = '<span class="nlp-done">✓ Done</span>';
            setTimeout(() => { ns.style.display = "none"; }, 2500);
            const cb = document.getElementById("corrected-box");
            cb.innerHTML = `<strong>${escHtml(corrected)}</strong>`;
        }

        function handlePred(d) {
            if (d.nlp_update) {
                showNlpDone(d.corrected_sentence || d.raw || "");
                return;
            }

            const ll = d.live_label ? `${d.live_label}  ${Math.round((d.confidence || 0) * 100)}%` : "— —";
            document.getElementById("live-label").textContent = ll;

            document.getElementById("spell-disp").textContent = d.current_word || "—";

            renderSentence(d.sentence, d.current_word);

            if (d.confirmed_word) showNlpProcessing();

            if (d.corrected_sentence) {
                const cb = document.getElementById("corrected-box");
                cb.innerHTML = `<strong>${escHtml(d.corrected_sentence)}</strong>` +
                    (d.sentence && d.sentence.length
                        ? `<div class="raw">${escHtml((d.sentence || []).join(" "))}</div>`
                        : "");
            }

            waveData.push(d.confidence || 0);
            waveData.shift();
            drawWave();

            if (d.top3 && d.top3.length) renderTop3(d.top3);

            if (d.history && d.history.length) renderHistory(d.history);

            if (d.confirmed_word) speak(d.confirmed_word);

            lastSentence = d.sentence || [];
        }

        function renderSentence(words, partial) {
            const ov = document.getElementById("sent-overlay");
            ov.innerHTML = "";
            (words || []).forEach(w => {
                const c = document.createElement("div");
                c.className = "chip"; c.textContent = w; ov.appendChild(c);
            });
            if (partial) {
                const c = document.createElement("div");
                c.className = "chip spell"; c.textContent = partial + "…"; ov.appendChild(c);
            }
        }

        function drawWave() {
            const canvas = document.getElementById("conf-wave");
            if (!canvas) return;
            const dpr = window.devicePixelRatio || 1;
            const W = canvas.parentElement.clientWidth - 24;
            const H = 44;
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            canvas.style.width = W + "px";
            canvas.style.height = H + "px";
            const ctx = canvas.getContext("2d");
            ctx.scale(dpr, dpr);
            ctx.clearRect(0, 0, W, H);

            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, "rgba(0,229,200,.3)");
            grad.addColorStop(1, "rgba(0,229,200,0)");
            ctx.fillStyle = grad;
            ctx.beginPath();
            waveData.forEach((v, i) => {
                const x = (i / (WAVE_LEN - 1)) * W;
                const y = H - v * (H - 4) - 2;
                i === 0 ? ctx.moveTo(x, H) : undefined;
                ctx.lineTo(x, y);
            });
            ctx.lineTo(W, H); ctx.closePath(); ctx.fill();

            ctx.strokeStyle = "#00e5c8";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            waveData.forEach((v, i) => {
                const x = (i / (WAVE_LEN - 1)) * W;
                const y = H - v * (H - 4) - 2;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        function renderTop3(top3) {
            const row = document.getElementById("top3-row");
            const items = row.querySelectorAll(".top3-item");
            top3.forEach((t, i) => {
                if (!items[i]) return;
                items[i].querySelector(".top3-label").textContent = t.label;
                items[i].querySelector(".top3-pct").textContent = Math.round(t.conf * 100) + "%";
                items[i].querySelector(".top3-fill").style.width = Math.round(t.conf * 100) + "%";
            });
        }

        function renderHistory(entries) {
            const list = document.getElementById("history-list");
            list.innerHTML = "";
            [...entries].reverse().forEach(e => {
                const div = document.createElement("div");
                div.className = "h-entry";
                div.innerHTML =
                    `<div class="h-word">${escHtml(e.word)}</div>` +
                    `<div class="h-sentence">${escHtml(e.corrected || e.raw || "")}</div>` +
                    `<div class="h-time">${escHtml(e.time)}</div>`;
                list.appendChild(div);
            });
        }

        async function doFlush() {
            showNlpProcessing();
            const r = await fetch("/flush_spelling", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
            const d = await r.json();
            if (d.flushed) { speak(d.flushed); renderSentence(d.sentence, ""); }
        }

        async function doReset() {
            await fetch("/reset", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
            document.getElementById("sent-overlay").innerHTML = "";
            document.getElementById("live-label").textContent = "— —";
            document.getElementById("spell-disp").textContent = "—";
            document.getElementById("corrected-box").innerHTML = '<span style="color:var(--dim)">Detecting…</span>';
            document.getElementById("history-list").innerHTML = "";
            waveData.fill(0); drawWave();
            toast("Session reset.");
        }

        function speakSentence() {
            if (lastSentence.length) speak(lastSentence.join(" "));
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.rate = 0.95; u.volume = 1;
            speechSynthesis.speak(u);
        }

        async function fetchVids() {
            try {
                const r = await fetch("/videos");
                availVids = await r.json();
            } catch (_) { toast("Could not load video list.", true); }
        }

        function buildQueue(sentence) {
            const tokens = [];
            sentence.trim().toLowerCase().split(/\s+/).forEach(word => {
                if (!word) return;
                if (availVids[word]) {
                    tokens.push({ label: word, src: `/static/videos/${availVids[word]}` });
                } else {
                    [...word.toUpperCase()].forEach(ch => {
                        const key = ch.toLowerCase();
                        tokens.push({ label: ch, src: availVids[key] ? `/static/videos/${availVids[key]}` : null });
                    });
                }
            });
            return tokens;
        }

        async function startPlayback() {
            await fetchVids();
            const inp = document.getElementById("txt-inp").value.trim();
            if (!inp) { toast("Type something first."); return; }
            vidQueue = buildQueue(inp); vidIdx = 0;
            renderQueueUI(); renderDots(); playNext();
        }

        function renderQueueUI() {
            const row = document.getElementById("queue-row");
            row.innerHTML = "";
            vidQueue.forEach((t, i) => {
                const c = document.createElement("div");
                c.className = "qchip"; c.id = `qc${i}`; c.textContent = t.label;
                if (!t.src) c.style.opacity = ".28";
                row.appendChild(c);
            });
        }
        function renderDots() {
            const pd = document.getElementById("pdots");
            pd.innerHTML = "";
            vidQueue.forEach((_, i) => {
                const d = document.createElement("div");
                d.className = "pdot"; d.id = `pd${i}`; pd.appendChild(d);
            });
        }
        function updateQueueUI(idx) {
            vidQueue.forEach((_, i) => {
                const c = document.getElementById(`qc${i}`);
                const d = document.getElementById(`pd${i}`);
                if (!c) return;
                c.classList.remove("playing", "done");
                d.classList.remove("cur", "done");
                if (i < idx) { c.classList.add("done"); d.classList.add("done"); }
                else if (i === idx) { c.classList.add("playing"); d.classList.add("cur"); }
            });
        }
        function playNext() {
            if (vidIdx >= vidQueue.length) {
                document.getElementById("now-lbl").style.display = "none";
                toast("Playback complete ✓"); return;
            }
            const tok = vidQueue[vidIdx];
            updateQueueUI(vidIdx);
            if (!tok.src) { vidIdx++; playNext(); return; }
            const v = document.getElementById("asl-vid");
            const ph = document.getElementById("vid-ph");
            const nl = document.getElementById("now-lbl");
            ph.style.display = "none";
            v.style.display = "block";
            nl.style.display = "block";
            nl.textContent = tok.label;
            v.src = tok.src; v.load();
            v.play().catch(() => { vidIdx++; playNext(); });
            v.onended = () => { vidIdx++; playNext(); };
            v.onerror = () => { toast(`Missing: ${tok.label}`, true); vidIdx++; playNext(); };
        }

        function setConn(cls, txt) {
            document.getElementById("cdot").className = `conn-dot ${cls}`;
            document.getElementById("conn-txt").textContent = txt;
        }

        function escHtml(s) {
            return String(s)
                .replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        let _tt;
        function toast(msg, err = false) {
            const el = document.getElementById("toast");
            el.textContent = msg;
            el.className = "show" + (err ? " err" : "");
            clearTimeout(_tt);
            _tt = setTimeout(() => el.classList.remove("show"), 3000);
        }

        document.getElementById("txt-inp").addEventListener("keydown", e => {
            if (e.key === "Enter") startPlayback();
        });

        window.addEventListener("resize", drawWave);
        drawWave();
        connectSSE();
    </script>
</body>

</html>
